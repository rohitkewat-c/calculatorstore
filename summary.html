<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Summary</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .summary-box {
      width: 350px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .summary-box button {
      width: 100%;
      padding: 10px;
      background: #27ae60;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 5px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<header>
  <h1>📦 Order Summary</h1>
</header>

<div class="summary-box">
  <h2>Product: <span id="productName"></span></h2>
  <h3>Price: ₹<span id="productPrice"></span></h3>

  <button onclick="confirmOrder()">Confirm Order</button>
</div>

<script>
  document.getElementById("productName").innerText =
    localStorage.getItem("productName");

  document.getElementById("productPrice").innerText =
    localStorage.getItem("productPrice");

  function confirmOrder() {
    localStorage.setItem("totalAmount",
      localStorage.getItem("productPrice"));
    window.location.href = "payment.html";
  }
</script>

</body>
</html>
